<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Bug Prediction Platform</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header text-center">
                    <h2>Smart Bug Prediction Platform</h2>
                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">
                                LOC
                            </label>
                            <input
                                type="number"
                                step="any"
                                class="form-control"
                                name="loc"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Cyclomatic Complexity (v(g))
                            </label>
                            <input
                                type="number"
                                step="any"
                                class="form-control"
                                name="vg"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Essential Complexity (ev(g))
                            </label>
                            <input
                                type="number"
                                step="any"
                                class="form-control"
                                name="evg"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Branch Count
                            </label>
                            <input
                                type="number"
                                step="any"
                                class="form-control"
                                name="branch_count"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Total Operators
                            </label>
                            <input
                                type="number"
                                step="any"
                                class="form-control"
                                name="total_op"
                                required>
                        </div>

                        <div class="d-grid">
                            <button
                                type="submit"
                                class="btn btn-primary">
                                Predict
                            </button>
                        </div>

                    </form>

                </div>
            </div>

            {% if result %}

            <div class="card shadow mt-4">

                <div class="card-body text-center">

                    <h3>Prediction Result</h3>

                    {% if result == "Buggy Module" %}

                    <div class="alert alert-danger mt-3">
                        <h4>{{ result }}</h4>
                    </div>

                    {% else %}

                    <div class="alert alert-success mt-3">
                        <h4>{{ result }}</h4>
                    </div>

                    {% endif %}

                    <h5>
                        Confidence:
                        {{ confidence }}%
                    </h5>

                    <h5>
                        Risk Level:
                        {{ risk }}
                    </h5>

                </div>

            </div>

            {% endif %}

        </div>

    </div>

</div>

</body>
</html>
